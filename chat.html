<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>RAG Chat</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>

*,
*::before,
*::after{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#0d1117;
    --surface:#161b22;
    --border:#30363d;

    --accent:#7c6cff;

    --text:#f0f6fc;
    --muted:#8b949e;

    --user-bubble:#6c63ff;
    --bot-bubble:#1d2530;

    --font:'Inter',system-ui,sans-serif;

}

body{

    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
    font-size:16px;

    display:flex;
    flex-direction:column;

    height:100dvh;

}

header{

    padding:18px 26px;

    border-bottom:1px solid var(--border);

    display:flex;
    align-items:center;
    gap:10px;

    background:#11161d;

}

.dot{

    width:10px;
    height:10px;

    border-radius:50%;

    background:var(--accent);

    box-shadow:0 0 12px var(--accent);

}

header span{

    color:var(--muted);

    font-size:13px;

    text-transform:uppercase;

    letter-spacing:.12em;

    font-weight:600;

}

#chat{

    flex:1;

    overflow-y:auto;

    padding:30px;

    display:flex;

    flex-direction:column;

    gap:22px;

    scrollbar-width:thin;

}

.message-wrap{

    display:flex;

    flex-direction:column;

}

.message-wrap.user-wrap{

    align-items:flex-end;

}

.message-wrap.bot-wrap{

    align-items:flex-start;

}

.label{

    color:var(--muted);

    font-size:11px;

    margin-bottom:6px;

    text-transform:uppercase;

    letter-spacing:.08em;

    font-weight:600;

}

.message{

    max-width:80%;

    padding:14px 18px;

    border-radius:16px;

    white-space:pre-wrap;

    word-break:break-word;

    line-height:1.7;

    font-size:15px;

    animation:fade .18s ease;

}

.user{

    background:var(--user-bubble);

    color:white;

}

.bot{

    background:var(--bot-bubble);

    border:1px solid var(--border);

}

.bot.thinking{

    color:var(--muted);

    font-style:italic;

}

.error{

    color:#ff6b6b;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(6px);

}

to{

opacity:1;
transform:none;

}

}

#input-area{

    padding:18px 24px;

    border-top:1px solid var(--border);

    display:flex;

    gap:12px;

    align-items:flex-end;

    background:#11161d;

}

#input{

    flex:1;

    background:var(--surface);

    border:1px solid var(--border);

    color:var(--text);

    border-radius:14px;

    padding:14px 16px;

    resize:none;

    outline:none;

    font-family:var(--font);

    font-size:15px;

    line-height:1.6;

    min-height:48px;

    max-height:160px;

    transition:.2s;

}

#input::placeholder{

    color:var(--muted);

}

#input:focus{

    border-color:var(--accent);

}

#send{

    height:48px;

    padding:0 20px;

    border:none;

    border-radius:14px;

    background:var(--accent);

    color:white;

    font-size:14px;

    font-weight:600;

    cursor:pointer;

    transition:.2s;

}

#send:hover{

    opacity:.9;

}

#send:disabled{

    opacity:.45;

    cursor:not-allowed;

}

::-webkit-scrollbar{

    width:8px;

}

::-webkit-scrollbar-thumb{

    background:#39414d;

    border-radius:10px;

}

@media(max-width:700px){

.message{

max-width:92%;

}

#chat{

padding:18px;

}

}

  </style>

</head>

<body>

<header>

<div class="dot"></div>

<span>RAG Chat</span>

</header>

<div id="chat"></div>

<div id="input-area">

<textarea
id="input"
placeholder="Ask something..."
rows="1"></textarea>

<button id="send">Send</button>

</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const sendBtn=document.getElementById("send");

function addMessage(text,role,extra=""){

const wrap=document.createElement("div");

wrap.className=`message-wrap ${role}-wrap`;

const label=document.createElement("div");

label.className="label";

label.textContent=
role==="user"
? "you"
: "RAG chat";

const msg=document.createElement("div");

msg.className=`message ${role} ${extra}`;

msg.textContent=text;

wrap.appendChild(label);

wrap.appendChild(msg);

chat.appendChild(wrap);

chat.scrollTop=chat.scrollHeight;

return msg;

}

async function send(){

const query=input.value.trim();

if(!query) return;

input.value="";

input.style.height="auto";

sendBtn.disabled=true;

addMessage(query,"user");

const thinkingEl=
addMessage(
"thinking...",
"bot",
"thinking"
);

try{

const res=
await fetch(
"http://localhost:3000/query",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
query
})
}
);

const data=
await res.json();

if(!res.ok)
throw new Error(
data.error||
"Server error"
);
      thinkingEl.textContent = data.response;
      thinkingEl.classList.remove("thinking");

    }catch(err){

      thinkingEl.textContent = "Error: " + err.message;
      thinkingEl.classList.add("error");
      thinkingEl.classList.remove("thinking");

    }finally{

      sendBtn.disabled = false;
      input.focus();

    }

}

sendBtn.addEventListener("click",send);

input.addEventListener("keydown",e=>{

    if(e.key==="Enter" && !e.shiftKey){

        e.preventDefault();

        send();

    }

});

input.addEventListener("input",()=>{

    input.style.height="auto";

    input.style.height=input.scrollHeight+"px";

});

</script>

</body>
</html>
